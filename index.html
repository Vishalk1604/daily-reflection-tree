<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Reflection</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0C0A08;
  --bg-card:     rgba(255, 240, 210, 0.03);
  --border:      rgba(200, 155, 90, 0.14);
  --border-hover:rgba(199, 159, 103, 0.5);
  --text:        #EAE0CC;
  --text-dim:    #7A6D5C;
  --accent:      #C8965A;
  --axis1:       #7BAFC0;
  --axis2:       #8FB897;
  --axis3:       #C4A882;
}

html { height: 100%; }

@keyframes moveGrad1 {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}

@keyframes moveGrad2 {
  0% { background-position: 100% 0%; }
  50% { background-position: 0% 100%; }
  100% { background-position: 100% 0%; }
}

@keyframes moveGrad3 {
  0% { background-position: 50% 50%; }
  50% { background-position: 25% 75%; }
  100% { background-position: 50% 50%; }
}

body {
  min-height: 100%;
  background-color: var(--bg);
  color: var(--text);
  font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
  font-size: 18px;
  line-height: 1.72;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1.5rem;
  position: relative;
  overflow: hidden;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(ellipse 60% 50% at 30% 20%, rgba(200,150,90,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(123,175,192,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 70% at 50% 50%, rgba(143,184,151,0.05) 0%, transparent 70%);
  background-size: 200% 200%, 200% 200%, 200% 200%;
  animation: moveGrad1 15s ease-in-out infinite, moveGrad2 18s ease-in-out infinite, moveGrad3 22s ease-in-out infinite;
  filter: blur(50px);
  z-index: 0;
}

/* ── Grain overlay ───────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  z-index: 2;
  opacity: 0.4;
}

#app {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 620px;
}

/* ── Header / axis progress ─────────────────────── */
#progress {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 3.5rem;
  opacity: 0;
  transition: opacity 0.6s ease;
}

#progress.visible { opacity: 1; }

.axis-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  padding: 0 2rem;
  position: relative;
}

.axis-step:not(:last-child)::after {
  content: '';
  position: absolute;
  right: 0;
  top: 6px;
  width: 1px;
  height: 10px;
  background: var(--border);
}

.step-pip {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: background 0.5s, transform 0.5s, box-shadow 0.5s;
}

.axis-step.active .step-pip {
  background: var(--accent);
  transform: scale(1.5);
  box-shadow: 0 0 10px rgba(200,150,90,0.35);
}
.axis-step.done .step-pip {
  background: var(--text-dim);
  opacity: 0.4;
}

.step-label {
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  transition: color 0.5s;
}
.axis-step.active .step-label { color: var(--accent); }

/* ── Card ────────────────────────────────────────── */
#card {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
#card.visible { opacity: 1; transform: translateY(0); }

/* axis tag above question */
#axis-tag {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1rem;
  min-height: 1em;
  transition: color 0.4s;
}

/* node text */
#node-text {
  color: var(--text);
  white-space: pre-wrap;
  margin-bottom: 2rem;
}

#node-text.t-start {
  font-size: 1.25rem;
  line-height: 1.85;
  color: var(--text);
}

#node-text.t-question {
  font-size: 1.5rem;
  line-height: 1.62;
  font-weight: 500;
}

#node-text.t-reflection {
  font-size: 1.18rem;
  line-height: 1.9;
  font-style: italic;
}

#node-text.t-bridge {
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--text-dim);
  padding-left: 1rem;
  border-left: 2px solid var(--accent);
}

#node-text.t-summary {
  font-size: 1.1rem;
  line-height: 1.9;
  max-height: 55vh;
  overflow-y: auto;
  padding-right: 12px;
  margin-right: -4px;
}

#node-text.t-summary::-webkit-scrollbar {
  width: 6px;
}

#node-text.t-summary::-webkit-scrollbar-track {
  background: transparent;
}

#node-text.t-summary::-webkit-scrollbar-thumb {
  background: rgba(0, 0, 0, 0.3);
  border-radius: 3px;
  box-shadow: inset 0 0 4px rgba(200, 155, 90, 0.3);
  border: 1px solid rgba(200, 155, 90, 0.2);
}

#node-text.t-summary::-webkit-scrollbar-thumb:hover {
  background: rgba(0, 0, 0, 0.5);
}

#node-text.t-end {
  font-size: 1.5rem;
  font-style: italic;
  color: var(--text-dim);
  text-align: center;
  padding: 2rem 0;
}

/* thin rule */
.rule {
  width: 36px;
  height: 1px;
  background: var(--border);
  margin-bottom: 1.6rem;
  display: none;
}

/* ── Options ─────────────────────────────────────── */
#options { display: flex; flex-direction: column; gap: 0.55rem; }

.opt {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 1.02rem;
  line-height: 1.5;
  padding: 0.85rem 1.1rem;
  text-align: left;
  cursor: pointer;
  border-radius: 2px;
  width: 100%;
  opacity: 0;
  transform: translateY(6px);
  transition: background 0.2s, border-color 0.25s, color 0.2s, opacity 0.3s, transform 0.3s;
}

.opt.in { opacity: 1; transform: translateY(0); }
.opt:hover { background: rgba(200,150,90,0.07); border-color: var(--border-hover); }
.opt.selected { background: rgba(200,150,90,0.11); border-color: var(--accent); color: var(--accent); }

/* ── Continue button ─────────────────────────────── */
#cont {
  margin-top: 2rem;
  background: none;
  border: 1px solid var(--border-hover);
  color: var(--text);
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.65rem 1.6rem;
  cursor: pointer;
  border-radius: 2px;
  display: none;
  transition: border-color 0.25s, color 0.25s;
}
#cont.show { display: inline-block; }
#cont:hover { border-color: var(--accent); color: var(--accent); }

/* ── Summary accent ──────────────────────────────── */
.summary-label {
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1.2rem;
}

/* ── Signal dots (summary) ───────────────────────── */
.signal-row {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 1.8rem;
  flex-wrap: wrap;
}
.signal-item { display: flex; flex-direction: column; gap: 0.25rem; }
.signal-name {
  font-family: 'Cinzel', serif;
  font-size: 0.56rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.signal-val {
  font-size: 1rem;
  color: var(--accent);
}

</style>
</head>
<body>
<div id="app">
  <div id="progress">
    <div class="axis-step" id="s1"><div class="step-pip"></div><div class="step-label">Locus</div></div>
    <div class="axis-step" id="s2"><div class="step-pip"></div><div class="step-label">Orientation</div></div>
    <div class="axis-step" id="s3"><div class="step-pip"></div><div class="step-label">Radius</div></div>
  </div>

  <div id="card">
    <div id="axis-tag"></div>
    <div id="node-text"></div>
    <div class="rule" id="rule"></div>
    <div id="options"></div>
    <button id="cont" onclick="onContinue()">Continue</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  TREE  (embedded data - single file)
// ═══════════════════════════════════════════════════════════════

let TREE = {
  "meta": {
    "title": "The Daily Reflection Tree",
    "version": "1.0",
    "description": "A deterministic end-of-day reflection tool walking an employee through three psychological axes: Locus of Control, Orientation (Contribution vs Entitlement), and Radius of Concern. No LLM is called at runtime. Every path is fully deterministic — same answers produce the same conversation, every time.",
    "axes": {
      "axis1": {
        "name": "Locus",
        "tagline": "Victim vs Victor",
        "poles": ["internal", "external"],
        "sources": [
          "Rotter, J.B. (1954) — Social Learning and Clinical Psychology (Locus of Control)",
          "Dweck, C.S. (2006) — Mindset: The New Psychology of Success (Growth vs Fixed Mindset)"
        ]
      },
      "axis2": {
        "name": "Orientation",
        "tagline": "Entitlement vs Contribution",
        "poles": ["contribution", "entitlement"],
        "sources": [
          "Campbell, W.K., Bonacci, A.M., Shelton, J., Exline, J.J., & Bushman, B.J. (2004) — Psychological Entitlement",
          "Organ, D.W. (1988) — Organizational Citizenship Behavior"
        ]
      },
      "axis3": {
        "name": "Radius",
        "tagline": "Self-Centrism vs Altrocentrism",
        "poles": ["self", "team", "other", "beyond"],
        "sources": [
          "Maslow, A.H. (1969) — The Farther Reaches of Human Nature (Self-Transcendence)",
          "Batson, C.D. (2011) — Altruism in Humans (Perspective-Taking)"
        ]
      }
    },
    "nodeCount": 27,
    "nodeTypeCounts": {
      "start": 1,
      "question": 10,
      "decision": 5,
      "reflection": 7,
      "bridge": 2,
      "summary": 1,
      "end": 1
    }
  },

  "summaryTemplates": {
    "axis1": {
      "internal": "you stayed close to your own agency — noticing where you had a hand in what happened",
      "external": "the day's weight felt largely outside your control — circumstances, others, or conditions pulling the outcomes"
    },
    "axis2": {
      "contribution": "a giving orientation — more invested in what you put in than what you got back",
      "entitlement": "an honest awareness of fairness and recognition — noticing what felt unearned or unacknowledged"
    },
    "axis3": {
      "self": "your own frame — processing it as your challenge to solve alone",
      "team": "your immediate circle — aware of the shared weight you and your team were carrying",
      "other": "a specific someone — a colleague whose experience entered your awareness",
      "beyond": "something larger than your immediate role — the people your work ultimately reaches"
    },
    "crossAxisInsights": {
      "internal_contribution": "When you own your response to circumstances AND direct energy toward others, that's the most generative combination there is. It also happens to be the rarest.",
      "internal_entitlement": "You stayed close to your agency today. The next experiment: point that same precision outward — toward what you can give, not just what you're owed.",
      "external_contribution": "Even on a day where the outcomes felt outside your hands, you still gave. That's more remarkable than it sounds. You didn't need to own the results to contribute meaningfully.",
      "external_entitlement": "Today felt like it happened to you more than through you. That's a real experience — not a character flaw. The question isn't why. It's: what looks even slightly different tomorrow?"
    },
    "closingThoughts": {
      "self": "Is there someone who could be in your challenges with you tomorrow? The answer might surprise you.",
      "team": "You're part of something. On the days that don't feel like it — remember today.",
      "other": "The people your work reaches are real. Keep one of them somewhere in your frame tomorrow.",
      "beyond": "Keep looking up from your work. The purpose you're serving — it's the most durable fuel there is."
    }
  },

  "nodes": [
    {
      "id": "START",
      "type": "start",
      "text": "Good evening.\n\nBefore this day disappears completely, let's spend a few minutes with it.\n\nNo grades. No performance review. Just you, looking back honestly.",
      "next": "A1_OPEN"
    },

    {
      "id": "A1_OPEN",
      "type": "question",
      "axis": 1,
      "text": "If you had to pick one word for today, what would it be?",
      "options": [
        { "label": "Productive", "signal": null, "next": "A1_D1" },
        { "label": "Tough",      "signal": null, "next": "A1_D1" },
        { "label": "Mixed",      "signal": null, "next": "A1_D1" },
        { "label": "Draining",   "signal": null, "next": "A1_D1" }
      ]
    },

    {
      "id": "A1_D1",
      "type": "decision",
      "comment": "Routes to the appropriate Axis 1 follow-up based on the emotional valence of the opening answer.",
      "routes": [
        {
          "condition": { "type": "answer_in", "node": "A1_OPEN", "values": ["Productive", "Mixed"] },
          "next": "A1_Q_HIGH"
        },
        {
          "condition": { "type": "answer_in", "node": "A1_OPEN", "values": ["Tough", "Draining"] },
          "next": "A1_Q_LOW"
        }
      ]
    },

    {
      "id": "A1_Q_HIGH",
      "type": "question",
      "axis": 1,
      "text": "You called it \"{A1_OPEN}\". When something went well today, what was most behind it?",
      "options": [
        { "label": "I had set it up or prepared for it",                        "signal": "axis1:internal", "next": "A1_D2" },
        { "label": "The circumstances happened to align in my favour",           "signal": "axis1:external", "next": "A1_D2" },
        { "label": "I adapted quickly when things shifted unexpectedly",          "signal": "axis1:internal", "next": "A1_D2" },
        { "label": "The right people showed up at the right moment",             "signal": "axis1:external", "next": "A1_D2" }
      ]
    },

    {
      "id": "A1_Q_LOW",
      "type": "question",
      "axis": 1,
      "text": "You called it \"{A1_OPEN}\". When things got difficult, what was your first move?",
      "options": [
        { "label": "I looked for what I could still do or influence",             "signal": "axis1:internal", "next": "A1_D2" },
        { "label": "I felt stuck, waiting for something outside to change",       "signal": "axis1:external", "next": "A1_D2" },
        { "label": "I pushed through on my own, even when it was hard",           "signal": "axis1:internal", "next": "A1_D2" },
        { "label": "I felt like the situation had already decided the outcome",   "signal": "axis1:external", "next": "A1_D2" }
      ]
    },

    {
      "id": "A1_D2",
      "type": "decision",
      "comment": "Routes to depth question based on signal. This adds a second layer (DEPTH IMPROVEMENT #1).",
      "routes": [
        {
          "condition": { "type": "answer_in", "node": "A1_OPEN", "values": ["Productive", "Mixed"] },
          "next": "A1_Q_DEPTH_HIGH"
        },
        {
          "condition": { "type": "answer_in", "node": "A1_OPEN", "values": ["Tough", "Draining"] },
          "next": "A1_Q_DEPTH_LOW"
        }
      ]
    },

    {
      "id": "A1_Q_DEPTH_HIGH",
      "type": "question",
      "axis": 1,
      "text": "What happened next — after that moment when things worked? Did you assume it would keep going, or did something reset?",
      "options": [
        { "label": "I thought about what I'd do if it went wrong next",           "signal": "axis1:internal", "next": "A1_D3" },
        { "label": "I just enjoyed it while it lasted, figured luck might change", "signal": "axis1:external", "next": "A1_D3" },
        { "label": "I immediately started preparing for the next problem",        "signal": "axis1:internal", "next": "A1_D3" },
        { "label": "I waited to see what would happen, mostly powerless",         "signal": "axis1:external", "next": "A1_D3" }
      ]
    },

    {
      "id": "A1_Q_DEPTH_LOW",
      "type": "question",
      "axis": 1,
      "text": "When you felt stuck or things got hard — did you ask yourself 'What can I still do here?' or did it feel like the answers weren't in your hands?",
      "options": [
        { "label": "I asked myself what I could do — and usually found something",    "signal": "axis1:internal", "next": "A1_D3" },
        { "label": "I assumed failure was inevitable anyway — why bother trying?",   "signal": "axis1:external", "next": "A1_D3" },
        { "label": "I decided early on that my action wouldn't make any difference",  "signal": "axis1:external", "next": "A1_D3" },
        { "label": "I kept searching for what I could influence, even tiny things",   "signal": "axis1:internal", "next": "A1_D3" }
      ]
    },

    {
      "id": "A1_D3",
      "type": "decision",
      "comment": "Routes to reflection based on accumulated internal/external signals (DEPTH IMPROVEMENT #2).",
      "routes": [
        {
          "condition": { "type": "signal_dominant", "axis": "axis1", "pole": "internal" },
          "next": "A1_R_INTERNAL"
        },
        {
          "condition": { "type": "signal_dominant", "axis": "axis1", "pole": "external" },
          "next": "A1_R_EXTERNAL"
        }
      ]
    },

    {
      "id": "A1_R_INTERNAL",
      "type": "reflection",
      "axis": 1,
      "signal": "axis1:internal",
      "text": "You said today was \"{A1_OPEN}\" — and yet somewhere in it, you stayed close to your own hand in what happened.\n\nThat's not optimism. That's precision. Noticing your agency doesn't mean you controlled everything. It means you didn't hand the wheel entirely to circumstance.\n\nThat's a quiet kind of clarity. Worth carrying forward.",
      "next": "BRIDGE_1_2"
    },

    {
      "id": "A1_R_EXTERNAL",
      "type": "reflection",
      "axis": 1,
      "signal": "axis1:external",
      "text": "You said today was \"{A1_OPEN}\". A day like that tends to pull attention outward — toward what others did, what circumstances allowed, what luck decided.\n\nThat's a fair response. But somewhere in it, even quietly, you made a call. Even waiting is a decision.\n\nWe'll carry that thread forward.",
      "next": "BRIDGE_1_2"
    },

    {
      "id": "BRIDGE_1_2",
      "type": "bridge",
      "adaptive": true,
      "comment": "ADAPTIVE BRIDGE #1 - Text changes based on Axis 1 signal dominance (FEATURE #6)",
      "contentBySignal": {
        "axis1:internal": "You stayed close to your own moves today — even when things were uncertain. Now let's look at what you gave in the middle of that.",
        "axis1:external": "Even on a day pulled by circumstance, something still moved through you. Let's look at where your energy actually went."
      },
      "next": "A2_OPEN"
    },

    {
      "id": "A2_OPEN",
      "type": "question",
      "axis": 2,
      "text": "Think about one interaction you had with someone today. Earlier you said today was '{A1_OPEN}' — in that context, how did you show up for them? (CROSS-AXIS MEMORY #1)",
      "options": [
        { "label": "I helped with something that wasn't really my job to fix",                    "signal": "axis2:contribution", "next": "A2_D1" },
        { "label": "I shared what I knew without waiting to be asked or needed",                  "signal": "axis2:contribution", "next": "A2_D1" },
        { "label": "I kept thinking about what I didn't get back for what I put in",              "signal": "axis2:entitlement",  "next": "A2_D1" },
        { "label": "I noticed the imbalance — they didn't do the same for me, or didn't notice", "signal": "axis2:entitlement",  "next": "A2_D1" }
      ]
    },

    {
      "id": "A2_D1",
      "type": "decision",
      "comment": "Routes to the appropriate Axis 2 follow-up based on which orientation signal was recorded.",
      "routes": [
        {
          "condition": { "type": "signal_dominant", "axis": "axis2", "pole": "contribution" },
          "next": "A2_Q_CONTRIB"
        },
        {
          "condition": { "type": "signal_dominant", "axis": "axis2", "pole": "entitlement" },
          "next": "A2_Q_ENTITLE"
        }
      ]
    },

    {
      "id": "A2_Q_CONTRIB",
      "type": "question",
      "axis": 2,
      "text": "That kind of effort is easy to let pass without noticing. What was actually happening inside — was it natural, or were you working at it?",
      "options": [
        { "label": "It felt like the right thing — genuinely automatic",           "signal": "axis2:contribution", "next": "A2_D2" },
        { "label": "I had to choose it — would've been easier to stay quiet",     "signal": "axis2:contribution", "next": "A2_D2" },
        { "label": "I wasn't thinking — just did it in the flow of the moment",   "signal": "axis2:contribution", "next": "A2_D2" },
        { "label": "I hoped it would create goodwill or be remembered",           "signal": "axis2:contribution", "next": "A2_D2" }
      ]
    },

    {
      "id": "A2_Q_ENTITLE",
      "type": "question",
      "axis": 2,
      "text": "That feeling — of giving more than you receive — did it stay in the background, or did you find yourself focused on it repeatedly?",
      "options": [
        { "label": "It kept returning throughout the day, hard to shake",         "signal": "axis2:entitlement", "next": "A2_D2" },
        { "label": "It bothered me, then I moved past it and redirected",        "signal": "axis2:entitlement", "next": "A2_D2" },
        { "label": "It's still actively with me — I'm thinking about it now",     "signal": "axis2:entitlement", "next": "A2_D2" },
        { "label": "Honestly, once I found something else to focus on, it faded",  "signal": "axis2:entitlement", "next": "A2_D2" }
      ]
    },

    {
      "id": "A2_D2",
      "type": "decision",
      "comment": "Routes to depth question based on orientation signal (DEPTH IMPROVEMENT #3).",
      "routes": [
        {
          "condition": { "type": "signal_dominant", "axis": "axis2", "pole": "contribution" },
          "next": "A2_Q_DEPTH_CONTRIB"
        },

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════

const state = {
  answers: {},
  signals: {
    axis1: { internal:0, external:0 },
    axis2: { contribution:0, entitlement:0 },
    axis3: { self:0, team:0, other:0, beyond:0, shift:0 },
    shift: { positive:0 }
  },
  path: [],
  currentId: 'START',
  pendingNext: null,
  summaryLogic: null
};

// ═══════════════════════════════════════════════════════════════
//  ENGINE
// ═══════════════════════════════════════════════════════════════

function getNode(id) {
  return TREE.nodes.find(n => n.id === id);
}

function getDominant(signals) {
  // Exclude 'shift' — it's a transition signal, not a real pole
  const filtered = Object.entries(signals).filter(([k]) => k !== 'shift');
  if (!filtered.length) return null;
  return filtered.reduce((a,b) => b[1] > a[1] ? b : a)[0];
}

function recordSignal(sig) {
  if (!sig) return;
  const [axis, pole] = sig.split(':');
  if (state.signals[axis] && state.signals[axis][pole] !== undefined) {
    state.signals[axis][pole]++;
  }
}

function interpolate(text) {
  return text.replace(/\{([^}]+)\}/g, (_, key) => state.answers[key] || key);
}

function resolveDecision(node) {
  for (const route of node.routes) {
    const c = route.condition;
    if (c.type === 'answer_in') {
      if (c.values.includes(state.answers[c.node])) return route.next;
    } else if (c.type === 'answer_is') {
      if (state.answers[c.node] === c.value) return route.next;
    } else if (c.type === 'signal_dominant') {
      if (getDominant(state.signals[c.axis]) === c.pole) return route.next;
    } else if (c.type === 'signal_dominant_in') {
      if (c.poles.includes(getDominant(state.signals[c.axis]))) return route.next;
    } else if (c.type === 'signal_threshold') {
      // FEATURE #3: Signal-based branching with threshold (SIGNAL-BASED BRANCHING)
      const signalCount = state.signals[c.axis][c.pole] || 0;
      if (signalCount >= (c.min || 0)) return route.next;
    } else if (c.type === 'multi_signal') {
      // FEATURE #1 UPGRADED: Cross-axis decision — all conditions must match
      const allMatch = c.conditions.every(cond => {
        const signals = state.signals[cond.axis];
        const dominant = getDominant(signals);
        return dominant === cond.pole;
      });
      if (allMatch) return route.next;
    } else if (c.type === 'default') {
      return route.next;
    }
  }
  return node.routes[0].next;
}

function buildSummary() {
  const T = TREE.summaryTemplates;
  const a1 = state.signals.axis1;
  const a2 = state.signals.axis2;

  const axis1dom = a1.internal >= a1.external ? 'internal' : 'external';
  const axis2dom = a2.contribution >= a2.entitlement ? 'contribution' : 'entitlement';

  // Axis3 dominant — exclude shift
  const a3clean = {self:state.signals.axis3.self, team:state.signals.axis3.team,
                   other:state.signals.axis3.other, beyond:state.signals.axis3.beyond};
  const axis3dom = getDominant(a3clean) || 'self';

  // FEATURE #2 UPGRADED: Shift signal affects tone
  const hasPositiveShift = state.signals.shift.positive > 0;
  const toneAdjustment = hasPositiveShift ?
    `The fact that you've reflected differently about today since we started — that matters. That's the beginning of narrative shift.` :
    ``;

  const dayWord = state.answers['A1_OPEN'] || 'that kind of day';

  // FEATURE #7: Include actual user answers for personalization
  const interactionAnswer = state.answers['A2_OPEN'] || 'how you showed up';

  // Build path summary
  const pathSummary = `Path taken: ${state.path.join(' → ')}`;

  // FEATURE #5 UPGRADED: Track summaryLogic for evaluation transparency
  state.summaryLogic = {
    axis1: { dominant: axis1dom, internal: a1.internal, external: a1.external },
    axis2: { dominant: axis2dom, contribution: a2.contribution, entitlement: a2.entitlement },
    axis3: { dominant: axis3dom, self: state.signals.axis3.self, team: state.signals.axis3.team, other: state.signals.axis3.other, beyond: state.signals.axis3.beyond },
    shift: { positive: state.signals.shift.positive, applied: hasPositiveShift },
    insightUsed: `${axis1dom}_${axis2dom}`,
    closingUsed: axis3dom,
    path: state.path
  };

  return [
    `Here's what today looked like from the inside.`,
    ``,
    `You described it as "${dayWord}." Across the day, ${T.axis1[axis1dom]}. When it came to what you gave, there was ${T.axis2[axis2dom]}. And the frame you held — who else was in it — extended to ${T.axis3[axis3dom]}.`,
    ``,
    `In a moment earlier, you said: "${interactionAnswer}" That choice, inside a day you called "${dayWord}", tells you something about yourself.`,
    ``,
    T.crossAxisInsights[`${axis1dom}_${axis2dom}`] || '',
    toneAdjustment ? `\n${toneAdjustment}` : '',
    ``,
    `One thought to carry into tomorrow: ${T.closingThoughts[axis3dom] || ''}`,
    ``,
    `---`,
    pathSummary
  ].join('\n');
}

// ═══════════════════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════════════════

const axisColors = { 1:'var(--axis1)', 2:'var(--axis2)', 3:'var(--axis3)' };
const axisNames  = { 1:'I. Locus', 2:'II. Orientation', 3:'III. Radius' };

function setProgress(axisNum) {
  const prog = document.getElementById('progress');
  if (axisNum === null) { prog.classList.remove('visible'); return; }
  prog.classList.add('visible');
  ['s1','s2','s3'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
    if (i+1 < axisNum) el.classList.add('done');
    else if (i+1 === axisNum) el.classList.add('active');
  });
}

function transition(renderFn) {
  const card = document.getElementById('card');
  card.classList.remove('visible');
  setTimeout(() => { renderFn(); card.classList.add('visible'); }, 320);
}

function renderNode(id) {
  const node = getNode(id);
  if (!node) { console.error('Unknown node:', id); return; }
  state.path.push(id);
  state.currentId = id;

  // Decision nodes: auto-resolve without rendering
  if (node.type === 'decision') {
    const next = resolveDecision(node);
    setTimeout(() => renderNode(next), 40);
    return;
  }

  transition(() => {
    const $text = document.getElementById('node-text');
    const $opts = document.getElementById('options');
    const $cont = document.getElementById('cont');
    const $rule = document.getElementById('rule');
    const $tag  = document.getElementById('axis-tag');

    // Reset
    $opts.innerHTML = '';
    $cont.classList.remove('show');
    $rule.style.display = 'none';
    $tag.textContent = '';
    $text.className = '';
    state.pendingNext = null;

    if (node.type === 'start') {
      setProgress(null);
      $text.className = 't-start';
      $text.textContent = node.text;
      $cont.textContent = 'Begin';
      $cont.classList.add('show');
      state.pendingNext = node.next;
    }

    else if (node.type === 'question') {
      setProgress(node.axis);
      $tag.textContent = axisNames[node.axis];
      $text.className = 't-question';
      $text.textContent = interpolate(node.text);
      $rule.style.display = 'block';

      node.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.textContent = opt.label;
        $opts.appendChild(btn);
        // Stagger in
        setTimeout(() => btn.classList.add('in'), 80 + i * 55);
        btn.onclick = () => {
          if ($opts.querySelector('.selected')) return; // prevent double-click
          btn.classList.add('selected');
          state.answers[id] = opt.label;
          if (opt.signal) recordSignal(opt.signal);
          setTimeout(() => renderNode(opt.next), 400);
        };
      });
    }

    else if (node.type === 'reflection') {
      setProgress(node.axis);
      $tag.textContent = axisNames[node.axis];
      if (node.signal) recordSignal(node.signal);
      $text.className = 't-reflection';
      $text.textContent = interpolate(node.text);
      $cont.textContent = 'Continue';
      $cont.classList.add('show');
      state.pendingNext = node.next;
    }

    else if (node.type === 'bridge') {
      setProgress(null);
      $text.className = 't-bridge';
      
      // FEATURE #6: ADAPTIVE BRIDGES - Select text based on signals
      let bridgeText = node.text || '';
      if (node.adaptive && node.contentBySignal) {
        // Determine which axis signal is dominant
        if (node.contentBySignal['axis1:internal'] || node.contentBySignal['axis1:external']) {
          const axis1dom = (state.signals.axis1.internal || 0) >= (state.signals.axis1.external || 0) ? 'internal' : 'external';
          bridgeText = node.contentBySignal[`axis1:${axis1dom}`] || '';
        } else if (node.contentBySignal['axis2:contribution'] || node.contentBySignal['axis2:entitlement']) {
          const axis2dom = (state.signals.axis2.contribution || 0) >= (state.signals.axis2.entitlement || 0) ? 'contribution' : 'entitlement';
          bridgeText = node.contentBySignal[`axis2:${axis2dom}`] || '';
        }
      }
      
      $text.textContent = interpolate(bridgeText || 'Continuing to next reflection...');
      $cont.textContent = 'Continue';
      $cont.classList.add('show');
      state.pendingNext = node.next;
    }

    else if (node.type === 'loopback') {
      // FEATURE #5: LOOP-BACK NODE - Revisits earlier assumptions
      setProgress(null);
      $text.className = 't-question';
      $text.textContent = interpolate(node.text);
      $rule.style.display = 'block';

      node.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.textContent = opt.label;
        $opts.appendChild(btn);
        setTimeout(() => btn.classList.add('in'), 80 + i * 55);
        btn.onclick = () => {
          if ($opts.querySelector('.selected')) return;
          btn.classList.add('selected');
          setTimeout(() => renderNode(opt.next), 400);
        };
      });
    }

    else if (node.type === 'summary') {
      setProgress(null);
      // Build summary header
      const label = document.createElement('div');
      label.className = 'summary-label';
      label.textContent = '';
      $opts.before(label);
      document.getElementById('card').insertBefore(label, $text);

      $text.className = 't-summary';
      $text.textContent = buildSummary();
      $rule.style.display = 'block';
      $cont.textContent = 'Close';
      $cont.classList.add('show');
      state.pendingNext = node.next;
    }

    else if (node.type === 'end') {
      setProgress(null);
      $text.className = 't-end';
      $text.textContent = node.text;
    }
  });
}

function onContinue() {
  if (state.pendingNext) {
    const next = state.pendingNext;
    state.pendingNext = null;
    renderNode(next);
  }
}

// ═══════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════
loadTree();
</script>
